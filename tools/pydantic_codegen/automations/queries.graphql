fragment SlackIntegration on SlackIntegration {
    __typename
    id
    teamName
    channelName
}
fragment WebhookIntegration on GenericWebhookIntegration {
    __typename
    id
    name
    urlEndpoint
    createdAt
}
fragment GithubIntegration on GitHubOAuthIntegration {
    __typename
    id
}

# ------------------------------------------------------------------------------
fragment ProjectScope on Project {
    __typename
    id
    name
}
fragment ArtifactPortfolioScope on ArtifactPortfolio {
    __typename
    id
    name
}
fragment ArtifactSequenceScope on ArtifactSequence {
    __typename
    id
    name
}

# ------------------------------------------------------------------------------
fragment FilterEventFields on FilterEventTriggeringCondition {
    __typename
    eventType
    filter
}

# ------------------------------------------------------------------------------
fragment RunQueue on RunQueue {
    __typename
    id
    name
}
fragment QueueJobActionFields on QueueJobTriggeredAction {
    __typename
    template
    queue {...RunQueue}
}
fragment NotificationActionFields on NotificationTriggeredAction {
    __typename
    title
    message
    severity
    integration {...SlackIntegration}
}
fragment WebhookActionFields on GenericWebhookTriggeredAction {
    __typename
    requestPayload
    integration {...WebhookIntegration}
}

# ------------------------------------------------------------------------------
fragment UserInfo on User {
    __typename
    id
    username
}

fragment TriggerFields on Trigger {
    __typename
    id
    createdAt
    createdBy {...UserInfo}
    updatedAt
    name
    description
    enabled
    scope {
        ...ProjectScope
        ...ArtifactPortfolioScope
        ...ArtifactSequenceScope
    }
    event: triggeringCondition {
        ...FilterEventFields
    }
    action: triggeredAction {
        ...QueueJobActionFields
        ...NotificationActionFields
        ...WebhookActionFields
    }
}

# ------------------------------------------------------------------------------
fragment PageInfo on PageInfo {
    endCursor
    hasNextPage
}

# ------------------------------------------------------------------------------
fragment PaginatedProjectsWithTriggers on ProjectConnection {
    __typename
    pageInfo {...PageInfo}
    edges {
        cursor
        node {
            triggers {...TriggerFields}
        }
    }
}
query ProjectTriggers (
    $cursor: String,
    $perPage: Int,
) {
    viewer {
        projects(after: $cursor, first: $perPage) {
            ...PaginatedProjectsWithTriggers
        }
    }
}
query ProjectTriggersForEntity (
    $entityName: String!,
    $cursor: String,
    $perPage: Int,
) {
    entity (name: $entityName) {
        projects(after: $cursor, first: $perPage) {
            ...PaginatedProjectsWithTriggers
        }
    }
}

# ------------------------------------------------------------------------------
fragment CreateFilterTriggerResult on CreateFilterTriggerPayload {
    __typename
    trigger {...TriggerFields}
    clientMutationId
}
mutation CreateFilterTrigger($params: CreateFilterTriggerInput!) {
    createFilterTrigger(input: $params) {
        ...CreateFilterTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment UpdateFilterTriggerResult on UpdateFilterTriggerPayload {
    __typename
    trigger {...TriggerFields}
    clientMutationId
}
mutation UpdateFilterTrigger($params: UpdateFilterTriggerInput!) {
    updateFilterTrigger(input: $params) {
        ...UpdateFilterTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment DeleteTriggerResult on DeleteTriggerPayload {
    __typename
    success
    clientMutationId
}
mutation DeleteTrigger($id: ID!) {
    deleteTrigger(input: {triggerID: $id}) {
        ...DeleteTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment PaginatedIntegrations on IntegrationConnection {
    __typename
    pageInfo {...PageInfo}
    edges {
        cursor
        node {
            __typename
            ...SlackIntegration @include(if: $includeSlack)
            ...WebhookIntegration @include(if: $includeWebhook)
        }
    }
}
query IntegrationsForEntity(
    $entityName: String!,
    $cursor: String,
    $perPage: Int,
    $includeSlack: Boolean = false,
    $includeWebhook: Boolean = false,
) {
    entity(name: $entityName) {
        integrations(after: $cursor, first: $perPage) {
            ...PaginatedIntegrations
        }
    }
}
