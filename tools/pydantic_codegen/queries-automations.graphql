fragment SlackIntegration on SlackIntegration {
    __typename
    id
    teamName
    channelName
}
fragment WebhookIntegration on GenericWebhookIntegration {
    __typename
    id
    name
    urlEndpoint
    secretRef
    accessTokenRef
    createdAt
}
fragment GithubIntegration on GitHubOAuthIntegration {
    __typename
    id
}

# ------------------------------------------------------------------------------
fragment ProjectScope on Project {
    __typename
    id
    name
}
fragment ArtifactCollectionScope on ArtifactCollection {
    __typename
    id
    name
}

# ------------------------------------------------------------------------------
fragment FilterEventTriggeringCondition on FilterEventTriggeringCondition {
    __typename
    eventType
    filter
}

# ------------------------------------------------------------------------------
fragment RunQueue on RunQueue {
    __typename
    id
    name
}
fragment QueueJobAction on QueueJobTriggeredAction {
    __typename
    template
    queue {...RunQueue}
}
fragment NotificationAction on NotificationTriggeredAction {
    __typename
    title
    message
    severity
    integration {...SlackIntegration}
}
fragment WebhookAction on GenericWebhookTriggeredAction {
    __typename
    requestPayload
    integration {...WebhookIntegration}
}

# ------------------------------------------------------------------------------
fragment UserInfo on User {
    __typename
    id
    username
}

fragment Trigger on Trigger {
    __typename
    id
    createdAt
    createdBy {...UserInfo}
    updatedAt
    name
    description
    enabled
    scope {
        ...ProjectScope
        ...ArtifactCollectionScope
    }
    event: triggeringCondition {
        ...FilterEventTriggeringCondition
    }
    action: triggeredAction {
        ...QueueJobAction
        ...NotificationAction
        ...WebhookAction
    }
}

# ------------------------------------------------------------------------------
fragment PageInfo on PageInfo {
    __typename
    endCursor
    hasNextPage
}

# ------------------------------------------------------------------------------
fragment PaginatedProjectTriggers on ProjectConnection {
    __typename
    pageInfo {...PageInfo}
    edges {
        cursor
        node {
            triggers {...Trigger}
        }
    }
}
query TriggersInProjects ($cursor: String, $perPage: Int) {
    viewer {
        projects(after: $cursor, first: $perPage) {...PaginatedProjectTriggers}
    }
}
query TriggersInEntityProjects ($entityName: String!, $cursor: String, $perPage: Int) {
    entity (name: $entityName) {
        projects(after: $cursor, first: $perPage) {...PaginatedProjectTriggers}
    }
}

# ------------------------------------------------------------------------------
fragment CreateFilterTriggerResult on CreateFilterTriggerPayload {
    __typename
    trigger {...Trigger}
    clientMutationId
}
mutation CreateFilterTrigger($params: CreateFilterTriggerInput!) {
    createFilterTrigger(input: $params) {
        ...CreateFilterTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment UpdateFilterTriggerResult on UpdateFilterTriggerPayload {
    __typename
    trigger {...Trigger}
    clientMutationId
}
mutation UpdateFilterTrigger($params: UpdateFilterTriggerInput!) {
    updateFilterTrigger(input: $params) {
        ...UpdateFilterTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment DeleteTriggerResult on DeleteTriggerPayload {
    __typename
    success
    clientMutationId
}
mutation DeleteTrigger($id: ID!) {
    deleteTrigger(input: {triggerID: $id}) {
        ...DeleteTriggerResult
    }
}

# ------------------------------------------------------------------------------
fragment PaginatedSlackIntegrations on IntegrationConnection {
    __typename
    pageInfo {...PageInfo}
    edges {
        cursor
        node {
            __typename
            ...SlackIntegration
        }
    }
}
query SlackIntegrationsInEntity($entityName: String!, $cursor: String, $perPage: Int) {
    entity(name: $entityName) {
        integrations(after: $cursor, first: $perPage) {...PaginatedSlackIntegrations}
    }
}
