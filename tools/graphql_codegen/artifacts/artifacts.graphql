fragment ProjectNames on Project {
  __typename
  name
  entityName
}

fragment ArtifactFragment on Artifact {
  id
  artifactSequence {
    name
    project {
      ...ProjectNames
    }
  }
  versionIndex
  artifactType {
    name
  }
  description
  metadata
  ttlDurationSeconds @include(if: true) # Workaround: ensures generated pydantic field defaults to `None`
  ttlIsInherited @include(if: true) # Workaround: ensures generated pydantic field defaults to `None`
  tags @include(if: true) {
    # Workaround: ensures generated pydantic field defaults to `None`
    ...TagFragment
  }
  historyStep @include(if: true) # Workaround: ensures generated pydantic field defaults to `None`
  state
  currentManifest {
    file {
      directUrl
    }
  }
  commitHash
  fileCount
  createdAt
  updatedAt
  aliases @include(if: $includeAliases) {
    artifactCollection {
      __typename
      project {
        ...ProjectNames
      }
      name
    }
    ...ArtifactAliasFragment
  }
}

fragment MembershipWithArtifact on ArtifactCollectionMembership {
  id
  artifactCollection {
    __typename
    id
    name
    project {
      ...ProjectNames
    }
  }
  artifact {
    ...ArtifactFragment
  }
}

fragment VersionedArtifactConnectionFragment on VersionedArtifactConnection {
  totalCount
  edges {
    node {
      ...ArtifactFragment
    }
    version
  }
  pageInfo {
    ...PageInfoFragment
  }
}

query ProjectArtifacts(
  $project: String!
  $entity: String!
  $type: String!
  $collection: String!
  $cursor: String
  $perPage: Int = 50
  $order: String
  $filters: JSONString
  $includeAliases: Boolean = true
) {
  project(name: $project, entityName: $entity) {
    artifactType(name: $type) {
      # NOTE: The node being aliased is named:
      # - `artifactCollection` for new servers
      # - `artifactSequence` for old servers
      artifactCollection: artifactCollection(name: $collection) {
        name
        artifacts(filters: $filters, after: $cursor, first: $perPage, order: $order) {
          ...VersionedArtifactConnectionFragment
        }
      }
    }
  }
}

fragment RunOutputArtifactConnectionFragment on ArtifactConnection {
  totalCount
  edges {
    node {
      ...ArtifactFragment
    }
  }
  pageInfo {
    ...PageInfoFragment
  }
}

fragment RunInputArtifactConnectionFragment on InputArtifactConnection {
  totalCount
  edges {
    node {
      ...ArtifactFragment
    }
  }
  pageInfo {
    ...PageInfoFragment
  }
}

query RunOutputArtifacts(
  $entity: String!
  $project: String!
  $runName: String!
  $cursor: String
  $perPage: Int
  $includeAliases: Boolean = true
) {
  project(name: $project, entityName: $entity) {
    run(name: $runName) {
      outputArtifacts(after: $cursor, first: $perPage) {
        ...RunOutputArtifactConnectionFragment
      }
    }
  }
}

query RunInputArtifacts(
  $entity: String!
  $project: String!
  $runName: String!
  $cursor: String
  $perPage: Int
  $includeAliases: Boolean = true
) {
  project(name: $project, entityName: $entity) {
    run(name: $runName) {
      inputArtifacts(after: $cursor, first: $perPage) {
        ...RunInputArtifactConnectionFragment
      }
    }
  }
}

query FetchLinkedArtifacts($artifactID: ID!) {
  artifact(id: $artifactID) {
    artifactMemberships {
      edges {
        node {
          aliases {
            ...ArtifactAliasFragment
          }
          versionIndex
          artifactCollection {
            __typename
            name
            project {
              ...ProjectNames
            }
          }
        }
      }
    }
  }
}

query FetchArtifactManifest($entityName: String!, $projectName: String!, $name: String!) {
  project(entityName: $entityName, name: $projectName) {
    artifact(name: $name) {
      currentManifest {
        file {
          directUrl
        }
      }
    }
  }
}

query ArtifactByID($id: ID!, $includeAliases: Boolean = true) {
  artifact(id: $id) {
    ...ArtifactFragment
  }
}

query ArtifactByName(
  $entityName: String!
  $projectName: String!
  $name: String!
  $enableTracking: Boolean
  $includeAliases: Boolean = true
) {
  project(name: $projectName, entityName: $entityName) {
    artifact(name: $name, enableTracking: $enableTracking) {
      ...ArtifactFragment
    }
  }
}

query ArtifactViaMembershipByName(
  $entityName: String!
  $projectName: String!
  $name: String!
  $includeAliases: Boolean = true
) {
  project(name: $projectName, entityName: $entityName) {
    artifactCollectionMembership(name: $name) {
      ...MembershipWithArtifact
    }
  }
}

query ArtifactUsedBy($id: ID!) {
  artifact(id: $id) {
    usedBy {
      edges {
        node {
          name
          project {
            name
            entityName
          }
        }
      }
    }
  }
}

query ArtifactCreatedBy($id: ID!) {
  artifact(id: $id) {
    createdBy {
      ... on Run {
        name
        project {
          name
          entityName
        }
      }
    }
  }
}

query ArtifactType($entityName: String, $projectName: String, $name: String!) {
  project(name: $projectName, entityName: $entityName) {
    artifact(name: $name) {
      artifactType {
        name
      }
    }
  }
}

# ---------------------------------------------------------------------------
mutation AddAliases($input: AddAliasesInput!) {
  addAliases(input: $input) {
    success
  }
}
mutation DeleteAliases($input: DeleteAliasesInput!) {
  deleteAliases(input: $input) {
    success
  }
}

mutation UpdateArtifact($input: UpdateArtifactInput!, $includeAliases: Boolean = true) {
  updateArtifact(input: $input) {
    artifact {
      ...ArtifactFragment
    }
  }
}

mutation DeleteArtifact($input: DeleteArtifactInput!) {
  deleteArtifact(input: $input) {
    artifact {
      id
    }
  }
}

mutation LinkArtifact($input: LinkArtifactInput!, $includeAliases: Boolean = true) {
  linkArtifact(input: $input) {
    versionIndex
    artifactMembership @include(if: true) {
      # Workaround: ensures generated pydantic field defaults to `None`
      ...MembershipWithArtifact
    }
  }
}

mutation UnlinkArtifact($input: UnlinkArtifactInput!) {
  unlinkArtifact(input: $input) {
    artifactID
    success
  }
}
