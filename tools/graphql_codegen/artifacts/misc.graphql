fragment TagFragment on Tag {
  __typename
  id
  name # The actual string name of the tag
}

fragment ArtifactAliasFragment on ArtifactAlias {
  __typename
  id
  alias # The actual string name of the alias
}

fragment PageInfoFragment on PageInfo {
  __typename
  endCursor
  hasNextPage
}

fragment OrgInfoFragment on Organization {
  name
  orgEntity {
    name
  }
}

query FetchOrgInfoFromEntity($entity: String!) {
  entity(name: $entity) {
    organization {
      ...OrgInfoFragment
    }
    user {
      organizations {
        ...OrgInfoFragment
      }
    }
  }
}

query FetchOrganization($org: String!) {
  organization(name: $org) {
    id
    name
    orgEntity {
      __typename
      id
      name
      entityType
    }
  }
}

# A generic probe of the feature flags evaluated for an organization.
# Org-targeted feature gates are always included; `OrgName` additionally
# selects legacy backend ramps keyed by org name.
query OrgFeatureFlags($orgName: String!) {
  organization(name: $orgName) {
    featureFlags(rampIDType: OrgName) {
      rampKey
      isEnabled
    }
  }
}
