name: Test Slack Notification
run-name: "Test Slack notification"

on:
  workflow_dispatch:
    inputs:
      channel_id:
        type: string
        description: "Slack channel ID to post to (defaults to SLACK_SDK_RELEASE_CHANNEL_ID secret)"
        required: false
      token_secret:
        type: choice
        description: "Which secret to use for the Slack bot token"
        required: true
        default: SLACK_BOT_TOKEN
        options:
          - SLACK_BOT_TOKEN
          - WANDB_CI_SLACK_BOT_TOKEN

jobs:
  test-slack:
    name: Send test message
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        id: slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ inputs.token_secret == 'WANDB_CI_SLACK_BOT_TOKEN' && secrets.WANDB_CI_SLACK_BOT_TOKEN || secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ inputs.channel_id || secrets.SLACK_SDK_RELEASE_CHANNEL_ID }}
            text: "Test Slack notification from GitHub Actions :test_tube:\n- Repository: ${{ github.repository }}\n- Actor: ${{ github.actor }}\n- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
