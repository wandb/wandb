name: Runner label probe
on:
  push:
    branches: ["07-23-release-speed-test"]
jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        label:
          - ubuntu-latest-8-cores
          - ubuntu-latest-16-cores
          - windows-latest-8-cores
          - linux-arm64-ubuntu24.04-8core
          - linux-arm64-ubuntu24.04-16core
          - macos-latest-xlarge
    runs-on: ${{ matrix.label }}
    timeout-minutes: 3
    steps:
      - shell: bash
        run: |
          echo "label ${{ matrix.label }} exists"
          nproc 2>/dev/null || sysctl -n hw.ncpu
