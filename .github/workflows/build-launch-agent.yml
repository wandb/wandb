name: Build Launch Agent

permissions:
  contents: read
  id-token: write # required for OIDC authentication

on:
  workflow_dispatch:
    inputs:
      ref:
        type: string
        required: false
        description: wandb ref to build agent from
        default: main
      tagName:
        type: string
        required: true
        description: Tag Name for the launch agent

defaults:
  run:
    working-directory: ./tools/launch_release/build

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: set-up-gcloud-sdk
        name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - id: set-up-gcp-credentials
        name: Set up GCP credentials
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{ secrets.GCP_REGISTRY_PROJECT_NAME }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_REGISTRY_SA }}

      - id: configure-docker-context
        name: Configure Docker for Google Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - id: build
        name: Build and push by digest
        uses: docker/build-push-action@v6
        with:
          context: ./tools/launch_release/build
          platforms: ${{ matrix.platform }}
          build-args: REF=${{ github.event.inputs.ref }}
          outputs: type=image,name=wandb/launch-agent-dev,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=wandb/launch-agent-dev:cache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: type=registry,ref=wandb/launch-agent-dev:cache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifest
        run: |
          TAG=${{ github.event.inputs.tagName }}
          docker buildx imagetools create \
            -t wandb/launch-agent-dev:$TAG \
            -t wandb/launch-agent-dev:latest \
            $(printf 'wandb/launch-agent-dev@sha256:%s ' *)
        working-directory: /tmp/digests
