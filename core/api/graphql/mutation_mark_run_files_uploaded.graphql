mutation MarkRunFilesUploaded(
    $entity: String!,
    $project: String!,
    $run: String!,
    $files: [String!]!,
) {
    markRunFilesUploaded(
        input: {
            entityName: $entity,
            projectName: $project,
            runName: $run,
            files: $files,
        }
    ) {
        success
    }
}
